<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PayFlow | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 min-h-screen relative flex items-center justify-center overflow-hidden">
  
  <!-- Background Decorations -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600/20 blur-[120px] rounded-full pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10 px-4 py-8">
    <!-- Card -->
    <div class="bg-slate-800 backdrop-blur-xl border border-slate-700 p-6 sm:p-8 rounded-2xl shadow-lg shadow-black/20 overflow-hidden relative">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-600"></div>
      
      <div class="text-center mb-8">
        <div class="mx-auto w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30 mb-6">
          <i class="fas fa-layer-group text-2xl text-slate-100"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-slate-100 mb-2">Welcome Back</h1>
        <p class="text-slate-400">Sign in to manage your invoices</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-slate-500"></i>
            </div>
            <input type="email" id="email" required class="w-full pl-10 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-slate-500"></i>
            </div>
            <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
          </div>
        </div>

        <button type="submit" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-slate-100 rounded-xl font-medium shadow-lg shadow-blue-500/25 transform hover:-translate-y-0.5 transition-all">
          Sign In <i class="fas fa-arrow-right ml-2 opacity-70"></i>
        </button>
      </form>
      
      <div class="mt-6 text-center">
        <p class="text-sm text-slate-400">Don't have an account? <a href="#" id="view-register" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign up</a></p>
      </div>

      <!-- Hidden Register Form Setup -->
      <form id="register-form" class="space-y-5 hidden mt-[-260px] relative z-20 bg-slate-800 pb-8">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
          <input type="text" id="reg-name" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <input type="email" id="reg-email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
          <input type="password" id="reg-password" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all">
        </div>
        <button type="submit" class="w-full py-3 bg-indigo-600 text-slate-100 rounded-xl font-medium">Create Account</button>
        <div class="mt-4 text-center">
          <p class="text-sm text-slate-400">Already have an account? <a href="#" id="view-login" class="text-blue-400">Sign in</a></p>
        </div>
      </form>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Remove auth requirement on login page.
    if(getToken()) window.location.href = '/pages/dashboard.html';

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    document.getElementById('view-register').addEventListener('click', (e) => {
      e.preventDefault();
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      // Fix visual glitch
      registerForm.style.marginTop = '0';
    });

    document.getElementById('view-login').addEventListener('click', (e) => {
      e.preventDefault();
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      
      try {
        const data = await api('/auth/login', 'POST', { email, password });
        setToken(data.token);
        window.location.href = '/pages/dashboard.html';
      } finally {
        btn.innerHTML = 'Sign In <i class="fas fa-arrow-right ml-2 opacity-70"></i>';
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      
      try {
        const data = await api('/auth/register', 'POST', { name, email, password });
        setToken(data.token);
        window.location.href = '/pages/dashboard.html';
      } catch (err) {}
    });
  </script>
</body>
</html>
