<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayFlow | Clients</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 flex">
  
  <div id="sidebar-container"></div>

  <main class="flex-1 transition-all duration-300 ml-0 md:ml-64 p-4 md:p-8 relative">
    <!-- Mobile Header -->
    <header class="md:hidden sticky top-0 bg-slate-950/80 backdrop-blur-md z-40 flex items-center justify-between p-4 -mx-4 -mt-4 border-b border-slate-800 mb-6">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-slate-900 border border-slate-700 rounded-lg text-slate-300 active:scale-95 transition-transform">
          <i class="fas fa-bars"></i>
        </button>
        <span class="text-lg font-bold text-slate-100">PayFlow</span>
      </div>
      <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
        <i class="fas fa-user-circle text-slate-400"></i>
      </div>
    </header>

    <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-blue-900/20 to-transparent pointer-events-none -z-10"></div>
    
    <header class="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-100 mb-2">Clients</h1>
        <p class="text-sm sm:text-base text-slate-400">Manage your clients and their contact information.</p>
      </div>
      <div class="w-full sm:w-auto">
        <button onclick="openModal()" class="w-full sm:w-auto justify-center px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-slate-100 rounded-xl font-medium transition-all shadow-lg shadow-blue-500/20 flex items-center gap-2">
          <i class="fas fa-plus"></i> Add Client
        </button>
      </div>
    </header>

    <div class="bg-slate-800 backdrop-blur-sm border border-slate-700 rounded-2xl shadow-lg shadow-black/20 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[600px]">
        <thead>
          <tr class="border-b border-slate-700 bg-slate-900 text-slate-400 text-sm tracking-wider uppercase">
            <th class="py-4 px-6 font-medium">Name</th>
            <th class="py-4 px-6 font-medium">Email</th>
            <th class="py-4 px-6 font-medium">Phone</th>
            <th class="py-4 px-6 font-medium text-right">Added On</th>
          </tr>
        </thead>
        <tbody id="clients-table" class="divide-y divide-slate-700/50">
          <tr>
            <td colspan="4" class="py-8 text-center text-slate-500">
              <i class="fas fa-spinner fa-spin mr-2"></i> Loading clients...
            </td>
          </tr>
        </tbody>
      </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="client-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[70] hidden flex items-center justify-center opacity-0 transition-opacity p-4">
    <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 shadow-lg shadow-black/20 transform scale-95 transition-transform" id="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-100">Add New Client</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-100 transition-colors"><i class="fas fa-times text-xl"></i></button>
      </div>
      <form id="client-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Name</label>
          <input type="text" id="c-name" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
          <input type="email" id="c-email" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Phone</label>
          <input type="text" id="c-phone" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="pt-2">
          <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-slate-100 rounded-xl font-medium transition-colors">Save Client</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadSidebar();
      loadClients();
    });

    async function loadClients() {
      const tbody = document.getElementById('clients-table');
      try {
        const clients = await api('/clients');
        
        if (clients.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-slate-500">No clients found. Add your first client to get started.</td></tr>`;
          return;
        }

        tbody.innerHTML = clients.map(c => `
          <tr class="hover:bg-slate-700/40 transition-colors">
            <td class="py-4 px-6 font-medium text-slate-100 flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-blue-900/50 text-blue-400 flex items-center justify-center font-bold text-xs uppercase">
                ${c.name.substring(0,2)}
              </div>
              ${c.name}
            </td>
            <td class="py-4 px-6 text-slate-400">${c.email || '-'}</td>
            <td class="py-4 px-6 text-slate-400">${c.phone || '-'}</td>
            <td class="py-4 px-6 text-slate-400 text-right">${new Date(c.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-red-400">Failed to load clients.</td></tr>`;
      }
    }

    const modal = document.getElementById('client-modal');
    const modalContent = document.getElementById('modal-content');
    
    function openModal() {
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modalContent.classList.remove('scale-95');
      }, 10);
    }
    
    function closeModal() {
      modal.classList.add('opacity-0');
      modalContent.classList.add('scale-95');
      setTimeout(() => {
        modal.classList.add('hidden');
        document.getElementById('client-form').reset();
      }, 300);
    }

    document.getElementById('client-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById('c-name').value,
        email: document.getElementById('c-email').value,
        phone: document.getElementById('c-phone').value
      };
      
      const btn = e.target.querySelector('button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      
      try {
        await api('/clients', 'POST', body);
        showToast('Client added successfully');
        closeModal();
        loadClients();
      } finally {
        btn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
